<div class="page">
  <mat-card class="soon-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>{{ title }}</mat-card-title>
      <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>
        El backend y las APIs para este deporte están en el roadmap. Mientras tanto puedes usar
        <strong>MLB</strong>, que ya incluye partidos, clima y predicciones.
      </p>
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-flat-button color="primary" routerLink="/mlb/today">Ir a MLB</a>
    </mat-card-actions>
  </mat-card>
</div>
