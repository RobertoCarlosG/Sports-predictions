<mat-toolbar color="primary" class="app-toolbar">
  <a mat-button class="brand" routerLink="/mlb/today" aria-label="Inicio">
    <span class="brand-title">{{ title }}</span>
  </a>
  <span class="toolbar-spacer"></span>
  <app-sport-tab-nav class="sport-tabs" [active]="activeSport" />
  <a

    routerLink="/operations"
    aria-label="Operaciones y configuración"
    title="Operaciones (ETL, modelo)"

  </a>
</mat-toolbar>
