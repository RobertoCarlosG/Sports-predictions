<mat-toolbar color="primary" class="app-toolbar">
  <a mat-button class="brand" routerLink="/mlb" aria-label="Inicio">
    <span class="brand-title">{{ title }}</span>
  </a>
  <span class="toolbar-spacer"></span>
  <mat-form-field appearance="outline" class="sport-field" subscriptSizing="dynamic">
    <mat-label>Deporte</mat-label>
    <mat-select [value]="sport" (selectionChange)="onSportChange($event.value)">
      @for (s of sports; track s.id) {
        <mat-option [value]="s.id">
          {{ s.label }}
          @if (!s.implemented) {
            <span class="option-hint">(pronto)</span>
          }
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-toolbar>

<main class="main-shell">
  <router-outlet />
</main>
